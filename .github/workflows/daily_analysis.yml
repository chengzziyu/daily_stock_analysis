# 每日股票分析工作流配置
name: 每日股票分析

# 触发方式：支持手动触发（workflow_dispatch）
on:
  workflow_dispatch:

# 定义执行任务
jobs:
  analyze:
    # 使用 Ubuntu 最新版运行环境
    runs-on: ubuntu-latest
    
    # 任务步骤
    steps:
      # 第一步：检出仓库代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 第二步：设置 Python 环境（匹配工具所需版本）
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 第三步：安装工具依赖包
      - name: 安装依赖
        run: pip install -r requirements.txt

      # 第四步：执行股票分析（核心步骤，添加飞书环境变量映射）
      - name: 执行股票分析
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_APP_ID: ""
          FEISHU_APP_SECRET: ""
        run: python main.py

      # 第五步：上传分析报告（保留原始功能）
      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: ./reports/
